services:
  # SPINE NODES (The Core of the Graph)
  spine:
    image: alpine:latest
    command: >
      sh -c "
        apk add --no-cache iproute2 net-snmp openssh &&
        ssh-keygen -A &&
        echo 'root:root' | chpasswd &&
        echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
        /usr/sbin/sshd &&
        tail -f /dev/null
      "
    deploy:
      replicas: 4
    networks:
      - node_creation_backbone_net

  # LEAF NODES (The Edge of the Graph)
  leaf:
    image: alpine:latest
    command: >
      sh -c "
        apk add --no-cache iproute2 net-snmp openssh &&
        ssh-keygen -A &&
        echo 'root:root' | chpasswd &&
        echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
        /usr/sbin/sshd &&
        tail -f /dev/null
      "
    deploy:
      replicas: 36
    networks:
      - node_creation_backbone_net
    depends_on:
      - spine

networks:
  node_creation_backbone_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
